<div class="login-page">

  <div class="login-header">
    <h1>Taskify</h1>
    <p>Organize your tasks easily</p>
  </div>

  <div class="login-box">
    <input [(ngModel)]="email" placeholder="Email" />
    <input [(ngModel)]="password" type="password" placeholder="Password" />

    <button (click)="login()">Login</button>
  </div>

</div>
