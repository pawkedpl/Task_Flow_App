<div class="tasks-page">

  <!-- HEADER -->
  <div class="header">
    <h1>Tasks</h1>
    <p>Stay organized and productive</p>
  </div>

  <!-- FORM -->
  <div class="task-form-card">
    <input type="text" [(ngModel)]="newTask.title" placeholder="Task title">
    <input type="datetime-local" [(ngModel)]="newTask.startDate">
    <input type="datetime-local" [(ngModel)]="newTask.endDate">
    <button (click)="addTask()">Add Task</button>
  </div>

  <!-- 🔥 EMPTY STATE -->
  <div class="empty-state" *ngIf="tasks.length === 0">
    <h2>No tasks yet</h2>
    <p>Add your first task to get started 🚀</p>
  </div>

  <!-- TASK LIST -->
  <div class="task-list" *ngIf="tasks.length > 0">

    <div
      class="task-item"
      *ngFor="let task of tasks"
      [class.done]="task.status === 'DONE'"
    >

      <div class="status-bar"></div>

      <div class="content">
        <h3>{{ task.title }}</h3>
        <span class="time">
          {{ task.startDate | date:'short' }} →
          {{ task.endDate | date:'short' }}
        </span>
      </div>

      <div class="actions">
        <button class="status-btn" (click)="toggleStatus(task)">
          {{ task.status === 'DONE' ? 'UNDO' : 'DONE' }}
        </button>

        <button class="delete" (click)="deleteTask(task.id)">
          ✖
        </button>
      </div>

    </div>

  </div>

</div>
