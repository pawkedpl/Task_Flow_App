<div class="tasks-container">

  <h2>Tasks</h2>

  <div class="task-input">
    <input [(ngModel)]="newTask.title" placeholder="Task title">

    <input type="datetime-local" [(ngModel)]="newTask.startDate">
    <input type="datetime-local" [(ngModel)]="newTask.endDate">

    <button (click)="addTask()">+ Add</button>
  </div>

  <div class="tasks-list">
    <div class="task-card"
         *ngFor="let t of tasks"
         [class.done]="t.status === 'DONE'">

      <div class="left">
        <div class="title">{{ t.title }}</div>

        <div class="dates">
          {{ t.startDate | date:'short' }}
          →
          {{ t.endDate | date:'short' }}
        </div>
      </div>

      <div class="right">
        <span class="badge"
              [class.done]="t.status === 'DONE'">
          {{ t.status }}
        </span>

        <button class="delete"
                (click)="deleteTask(t.id)">
          ✕
        </button>
      </div>

    </div>
  </div>

</div>
