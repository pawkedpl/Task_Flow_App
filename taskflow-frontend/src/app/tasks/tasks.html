<div class="tasks-container">
  <h2>Your Tasks</h2>

  <div class="task-input">
    <input [(ngModel)]="newTask" placeholder="New task..." />
    <button (click)="addTask()">Add</button>
  </div>

  <div class="task-list">
    <div class="task" *ngFor="let task of tasks">
      {{ task.title }}
    </div>
  </div>
</div>
