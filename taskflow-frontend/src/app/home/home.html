<div class="home">

  <h1 class="title">📊 Statistics</h1>

  <div class="stats">

    <div class="card completed">
      <div class="icon">✅</div>
      <div>
        <p>Completed</p>
        <h2>{{ completed }}</h2>
      </div>
    </div>

    <div class="card total">
      <div class="icon">📋</div>
      <div>
        <p>Total Tasks</p>
        <h2>{{ total }}</h2>
      </div>
    </div>

    <div class="card overdue">
      <div class="icon">⚠️</div>
      <div>
        <p>Overdue</p>
        <h2>{{ overdue }}</h2>
      </div>
    </div>

  </div>

</div>
