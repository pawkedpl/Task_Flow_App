<div class="sidebar" [class.collapsed]="collapsed">

  <div>
    <div class="logo" routerLink="/home">
      {{ collapsed ? 'T' : 'Taskify' }}
    </div>

    <nav class="menu">
      <a routerLink="/home" routerLinkActive="active" data-label="Home">
        <span class="indicator"></span>
        🏠 <span *ngIf="!collapsed">Home</span>
      </a>

      <a routerLink="/dashboard" routerLinkActive="active" data-label="Dashboard">
        <span class="indicator"></span>
        📅 <span *ngIf="!collapsed">Dashboard</span>
      </a>

      <a routerLink="/tasks" routerLinkActive="active" data-label="Tasks">
        <span class="indicator"></span>
        📋 <span *ngIf="!collapsed">Tasks</span>
      </a>
    </nav>
  </div>

  <div class="bottom">
    <button (click)="toggleSidebar()" data-label="Toggle">☰</button>
    <button (click)="toggleTheme()" data-label="Theme">🌙</button>
    <button (click)="logout()" data-label="Logout">
      🚪 <span *ngIf="!collapsed">Logout</span>
    </button>
  </div>

</div>
