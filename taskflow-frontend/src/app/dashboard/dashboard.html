<div class="dashboard">

  <h2>This Week</h2>

  <div class="week-grid">

    <div class="day" *ngFor="let d of weekDays">

      <div class="day-header">
        <strong>{{ d.name }}</strong><br>
        <small>{{ d.date }}</small>
      </div>

      <div class="tasks">

        <div class="task" *ngFor="let t of d.tasks">
          <span>{{ t.title }}</span>
        </div>

      </div>

    </div>

  </div>

</div>
