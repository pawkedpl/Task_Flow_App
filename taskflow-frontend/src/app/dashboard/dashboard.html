<div class="dashboard">

  <div class="header">
    <h2>This Week</h2>
    <p>Your weekly overview</p>
  </div>

  <div class="calendar-card">

    <!-- DAYS -->
    <div class="week-grid">
      <div class="day" *ngFor="let d of weekDays">
        <div class="day-header">
          <strong>{{ d.name }}</strong>
          <small>{{ d.date }}</small>
        </div>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="bars.length === 0" class="empty">
      <h3>No tasks yet</h3>
      <p>Add tasks to see them here 🚀</p>
    </div>

    <!-- TIMELINE -->
    <div class="timeline" *ngIf="bars.length > 0">

      <div class="row" *ngFor="let bar of bars">

        <div
          class="bar"
          [style.gridColumn]="bar.startIndex + 1 + ' / span ' + bar.length"
          [class.done]="bar.status === 'DONE'"
          (click)="markDone(bar)">

          {{ bar.title }}

        </div>

      </div>

    </div>

  </div>

</div>
